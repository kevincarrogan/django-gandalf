name: Django matrix

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "4.2"
          - python-version: "3.10"
            django-version: "5.2"
          - python-version: "3.11"
            django-version: "4.2"
          - python-version: "3.11"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "4.2"
          - python-version: "3.12"
            django-version: "5.2"
          - python-version: "3.12"
            django-version: "6.0"
          - python-version: "3.13"
            django-version: "5.2"
          - python-version: "3.13"
            django-version: "6.0"
          - python-version: "3.14"
            django-version: "5.2"
          - python-version: "3.14"
            django-version: "6.0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --group dev --with "django~=${{ matrix.django-version }}" pytest
