name: Functional tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  functional:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Check functional coverage
        run: just coverage-functional
